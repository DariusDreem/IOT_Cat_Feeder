# =============================================================
# docker-compose.yml — Cat Feeder (Mosquitto + Bridge Python)
#
# Démarrage rapide sur Raspberry Pi :
#   docker compose up -d                         # lancer les services
#   docker compose --profile seed up seed        # (optionnel) données de test
#   docker compose logs -f                       # voir les logs
#   docker compose down                          # arrêter
#   docker compose down -v                       # arrêter + supprimer les volumes
# =============================================================
services:

  # -----------------------------------------------------------
  # Broker MQTT
  # -----------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: catfeeder-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (accessible par l'ESP32 sur le réseau local)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Bridge Python : MQTT ↔ WebSocket
  # -----------------------------------------------------------
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catfeeder-bridge
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    ports:
      - "8765:8765"   # WebSocket (accessible par l'app React)
    volumes:
      - bridge-data:/data
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      WS_HOST: "0.0.0.0"
      WS_PORT: "8765"
      DB_PATH: /data/catfeeder.db
      CLOUD_API_URL: "http://backend:3000" # Synchro avec le backend local
      
  # -----------------------------------------------------------
  # Seed (optionnel) — données de test pour la première utilisation
  # Lance : docker compose --profile seed up seed
  # -----------------------------------------------------------
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catfeeder-seed
    profiles: ["seed"]
    volumes:
      - bridge-data:/data
    environment:
      DB_PATH: /data/catfeeder.db
    command: ["python3", "seed.py"]

  # -----------------------------------------------------------
  # PostgreSQL (Base de données Principale Cloud - Prototype)
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: catfeeder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catfeeder_user
      POSTGRES_PASSWORD: catfeeder_pass
      POSTGRES_DB: catfeeder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catfeeder_user -d catfeeder_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Backend API (Cloud - Prototype)
  # -----------------------------------------------------------
  backend:
    build:
      context: ../Cloud/backend
      dockerfile: Dockerfile
    container_name: catfeeder-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://catfeeder_user:catfeeder_pass@postgres:5432/catfeeder_db
      - API_KEY=secret-bridge-key
    depends_on:
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # Serveur Web Nginx : Front-End React (Cloud - Prototype)
  # -----------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: catfeeder-frontend
    restart: unless-stopped
    ports:
      - "8080:80"       # Web (accessible via l'adresse IP du Raspberry sur le port 8080 au lieu de 80)
    volumes:
      - ../Cloud/dist:/usr/share/nginx/html:ro # Monte le dossier dist compilé de Vite
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro # Configuration Nginx
    depends_on:
      - backend

# -----------------------------------------------------------
# Volumes persistants
# -----------------------------------------------------------
volumes:
  mosquitto-data:
  mosquitto-log:
  bridge-data:
  postgres-data:
