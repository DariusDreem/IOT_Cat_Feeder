# =============================================================
# docker-compose.yml — Cat Feeder (Cloud Infrastructure)
#
# Démarrage : docker-compose up -d
# =============================================================
version: '3.8'

services:

  # -----------------------------------------------------------
  # PostgreSQL (Base de données Principale pour Cloud)
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: catfeeder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catfeeder_user
      POSTGRES_PASSWORD: catfeeder_pass
      POSTGRES_DB: catfeeder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catfeeder_user -d catfeeder_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Backend API (Python FastAPI / Node Express au choix)
  # Ce service doit exposer une route pour synchroniser /sync
  # depuis le pont Edge (Raspberry)
  # -----------------------------------------------------------
  backend:
    # Pour le moment, utilisez une simple image mock ou décommentez pour un vrai build
    # build: ./api
    image: python:3.11-alpine # Placeholder
    container_name: catfeeder-api
    restart: unless-stopped
    command: sh -c "echo 'Backend API Placeholder' && tail -f /dev/null"
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://catfeeder_user:catfeeder_pass@postgres:5432/catfeeder_db
    depends_on:
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # Serveur Web Nginx : Front-End React (Dist build via Vite)
  # -----------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: catfeeder-frontend-cloud
    restart: unless-stopped
    ports:
      - "80:80"       # Accès public Web
    volumes:
      # Si dist est à la racine de Cloud pour Vite, ou ajustez le chemin vers ./dist
      - ./dist:/usr/share/nginx/html:ro
      - ../Raspberry/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres-data:

