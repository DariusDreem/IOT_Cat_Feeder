# ============================================================
# mosquitto.conf — Configuration Mosquitto pour Cat Feeder
# ============================================================

# Écouter sur le port MQTT standard (accessible depuis le réseau local)
listener 1883
protocol mqtt

# Autoriser les connexions anonymes (pas d'authentification requise)
# Pour un déploiement plus sécurisé, ajouter un fichier de mots de passe :
#   password_file /mosquitto/config/passwd
allow_anonymous true

# Persistance des messages entre redémarrages
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

